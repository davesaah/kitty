# vim:ft=kitty
## name:     Midnight Jazz Kitty
## palette:  Dark Coffee / Onyx / Olive Wood
# The basic colors
foreground              #D4B896
background              #100e0e
selection_foreground    #100e0e
selection_background    #7f5839
# Cursor colors
cursor                  #7f5839
cursor_text_color       #100e0e
# URL underline color when hovering with mouse
